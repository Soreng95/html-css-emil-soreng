<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainy Days | Home</title>
    <meta
      name="description"
      content="Explore durable rain jackets for men and women at Rainy Days. Built for mountains, city streets, and everyday adventures."
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <header class="site-header">
      <nav class="nav-mobile" aria-label="Mobile navigation">
        <input class="nav-mobile__toggle" type="checkbox" id="nav-toggle" />

        <div class="container nav-mobile__top">
          <label
            class="nav-mobile__btn"
            for="nav-toggle"
            aria-label="Toggle menu"
          >
            <span class="nav-mobile__bar"></span>
            <span class="nav-mobile__bar"></span>
            <span class="nav-mobile__bar"></span>
          </label>

          <a
            href="index.html"
            class="nav-mobile__logo-link"
            aria-label="Rainy Days home"
          >
            <img
              class="nav-mobile__logo"
              src="assets/images/logo/RainyDays_Logo_SecondaryColor.png"
              alt="Rainy Days logo"
            />
          </a>
        </div>

        <div class="nav-mobile__overlay">
          <div class="nav-mobile__panel" role="dialog" aria-label="Menu">
            <div class="nav-mobile__panel-inner">
              <div class="nav-mobile__links">
                <a
                  class="nav-mobile__link nav-mobile__link--active"
                  href="index.html"
                  >Home</a
                >
                <a class="nav-mobile__link" href="products/index.html"
                  >Shop All</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >Men</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >Women</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >New Arrivals</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >About Us</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >Contact</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >Search</a
                >
                <a class="nav-mobile__link" href="cart-page/index.html">Cart</a>
              </div>
            </div>
          </div>

          <label
            class="nav-mobile__backdrop"
            for="nav-toggle"
            aria-label="Close menu"
          ></label>
        </div>
      </nav>

      <nav class="nav-desktop" aria-label="Desktop navigation">
        <div class="container nav-desktop__inner">
          <div
            class="nav-desktop__group nav-desktop__group--left"
            aria-label="Primary categories"
          >
            <a class="nav-link" href="products/index.html">Shop All</a>
            <a class="nav-link" href="coming-soon/index.html">Men</a>
            <a class="nav-link" href="coming-soon/index.html">Women</a>
          </div>

          <a
            href="index.html"
            class="nav-desktop__logo-link"
            aria-label="Rainy Days home"
          >
            <img
              class="nav-desktop__logo-image"
              src="assets/images/logo/RainyDays_Logo_SecondaryColor.png"
              alt="Rainy Days logo"
            />
          </a>

          <div class="nav-desktop__group nav-desktop__group--right">
            <div class="nav-desktop__links" aria-label="Company links">
              <a class="nav-link" href="coming-soon/index.html">New Arrivals</a>
              <a class="nav-link" href="coming-soon/index.html">About Us</a>
              <a class="nav-link" href="coming-soon/index.html">Contact</a>
            </div>

            <div class="nav-desktop__icons" aria-label="Actions">
              <a
                class="icon-btn"
                href="coming-soon/index.html"
                aria-label="Search"
                >Search</a
              >
              <a class="icon-btn" href="cart-page/index.html" aria-label="Cart"
                >Cart</a
              >
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero__overlay">
          <div class="container hero__content">
            <h1 class="hero__title">For the mountains &amp; Every Day</h1>

            <div class="hero__cta">
              <p class="hero__text">Discover Quality like no other</p>
              <a class="hero__button" href="products/index.html">Get into it</a>
            </div>
          </div>
        </div>
      </section>
      <section class="product-gallery">
        <div class="container">
          <div class="product-gallery__grid">
            <article class="product-gallery__card">
              <a href="products/index.html" class="product-gallery__link">
                <img
                  src="assets/images/jacketOnPeople/pexels-mauroignaciotorres-17052555.jpg"
                  alt="Man wearing a yellow rain jacket"
                  class="product-gallery__image"
                />
              </a>
            </article>

            <article class="product-gallery__card">
              <a href="products/index.html" class="product-gallery__link">
                <img
                  src="assets/images/jacketOnPeople/pexels-infected-store-1913417375-28758134.jpg"
                  alt="Person wearing a white rain jacket"
                  class="product-gallery__image"
                />
              </a>
            </article>

            <article class="product-gallery__card">
              <a href="products/index.html" class="product-gallery__link">
                <img
                  src="assets/images/jacketOnPeople/pexels-joey-cede-2152653963-35900422.jpg"
                  alt="Person wearing a black rain jacket viewed from behind"
                  class="product-gallery__image"
                />
              </a>
            </article>

            <article class="product-gallery__card">
              <a href="products/index.html" class="product-gallery__link">
                <img
                  src="assets/images/jacketOnPeople/pexels-infected-store-1913417375-28758137.jpg"
                  alt="Man wearing a light grey rain jacket"
                  class="product-gallery__image"
                />
              </a>
            </article>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

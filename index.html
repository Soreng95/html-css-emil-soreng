<!doctype html>

    <title>Rainy Days | Home</title>
    <meta
      name="description"
      content="Rainy Days is an online store for durable jackets designed for rainy adventures."

  <body>
    <header class="site-header">
      <nav class="nav-mobile" aria-label="Mobile navigation">

            for="nav-toggle"
            aria-label="Toggle menu"
          >
            <span class="nav-mobile__bar"></span>
            <span class="nav-mobile__bar"></span>
            <span class="nav-mobile__bar"></span>
          </label>

          <a
            class="nav-mobile__logo"
            href="index.html"
            aria-label="Rainy Days home"
            >LOGO</a
          >
        </div>

        <div class="nav-mobile__overlay">
          <div class="nav-mobile__panel" role="dialog" aria-label="Menu">
            <div class="nav-mobile__panel-inner">
              <div class="nav-mobile__links">
                <a
                  class="nav-mobile__link nav-mobile__link--active"
                  href="index.html"
                  >Home</a
                >
                <a class="nav-mobile__link" href="products/index.html"
                  >Shop All</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >Men</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >Women</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >New Arrivals</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >About Us</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >Contact</a
                >
                <a class="nav-mobile__link" href="coming-soon/index.html"
                  >Search</a
                >
                <a class="nav-mobile__link" href="cart-page/index.html">Cart</a>
              </div>
            </div>
          </div>

          <label
            class="nav-mobile__backdrop"
            for="nav-toggle"
            aria-label="Close menu"
          ></label>
        </div>
      </nav>

      <nav class="nav-desktop" aria-label="Desktop navigation">
        <div class="container nav-desktop__inner">
          <div
            class="nav-desktop__group nav-desktop__group--left"
            aria-label="Primary categories"
          >
            <a class="nav-link nav-link--active" href="products/index.html"
              >Shop All</a
            >
            <a class="nav-link" href="coming-soon/index.html">Men</a>
            <a class="nav-link" href="coming-soon/index.html">Women</a>
          </div>

          <a
            class="nav-desktop__logo"
            href="index.html"
            aria-label="Rainy Days home"
            >LOGO</a
          >

          <div class="nav-desktop__group nav-desktop__group--right">
            <div class="nav-desktop__links" aria-label="Company links">
              <a class="nav-link" href="coming-soon/index.html">New Arrivals</a>
              <a class="nav-link" href="coming-soon/index.html">About Us</a>
              <a class="nav-link" href="coming-soon/index.html">Contact</a>
            </div>

            <div class="nav-desktop__icons" aria-label="Actions">
              <a
                class="icon-btn"
                href="coming-soon/index.html"
                aria-label="Search"
                >Search</a
              >
              <a class="icon-btn" href="cart-page/index.html" aria-label="Cart"
